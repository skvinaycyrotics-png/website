name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Check Types
      run: npm run typecheck

    - name: Lint
      # FIXED: Changed from 'npm run lint' to calling 'npx next lint' directly 
      # with an explicit root directory dot (.) parameter to prevent Next.js from looking for a '/lint' folder.
      run: npx next lint .

    - name: Build
      run: npm run build
      env:
        # Dummy vars for build time validation
        DATABASE_URL: "postgresql://localhost:5432/dummy"
        JWT_SECRET_KEY: "dummy-key-for-build"
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "dummy"
